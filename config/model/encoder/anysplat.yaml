defaults:
  - backbone: croco

name: anysplat
mode: ${mode}

opacity_mapping:
  initial: 0.0
  final: 0.0
  warm_up: 1

num_monocular_samples: 32
num_surfaces: 1
predict_opacity: false

gaussians_per_pixel: 1

gaussian_adapter:
  gaussian_scale_min: 0.5
  gaussian_scale_max: 15.0
  sh_degree: 4

d_feature: 32

visualizer:
  num_samples: 8
  min_resolution: 256
  export_ply: false

apply_bounds_shim: true

pretrained_weights: ""
scale_align: false

voxel_size: 0.001
n_offsets: 2
anchor_feat_dim: 83 # 32
add_view: false
color_attr: 3D # 3D or RGB
mlp_type: unified
scaffold: true
